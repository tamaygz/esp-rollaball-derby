<!DOCTYPE html>
<html>
<head><title>SVG Test</title></head>
<body style="background: #222; padding: 20px;">
<h2 style="color:white">Direct SVG img tags:</h2>
<div style="margin: 10px 0;">
  <h3 style="color:white">track-bg.svg (should show sky, hills, fence, turf):</h3>
  <img src="/assets/themes/horse/track-bg.svg" style="width:800px; height:200px; border:1px solid red;" />
</div>
<div style="margin: 10px 0;">
  <h3 style="color:white">sprite.svg (horse+jockey, white fill):</h3>
  <img src="/assets/themes/horse/sprite.svg" style="width:200px; height:144px; border:1px solid red; background: green;" />
</div>
<div style="margin: 10px 0;">
  <h3 style="color:white">finish-flag.svg:</h3>
  <img src="/assets/themes/horse/finish-flag.svg" style="width:104px; height:168px; border:1px solid red; background: green;" />
</div>
<h2 style="color:white; margin-top: 40px;">Canvas rendering test (how Pixi sees them):</h2>
<canvas id="testCanvas" width="800" height="200" style="border:1px solid yellow;"></canvas>
<script>
async function test() {
  const img = new Image();
  img.src = '/assets/themes/horse/track-bg.svg';
  await new Promise(r => { img.onload = r; img.onerror = e => { console.error('SVG load error:', e); r(); }; });
  console.log('SVG loaded. Natural size:', img.naturalWidth, 'x', img.naturalHeight);
  const canvas = document.getElementById('testCanvas');
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, 800, 200);
  console.log('Canvas drawn');
}
test();
</script>
</body>
</html>
