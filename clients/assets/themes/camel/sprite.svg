<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 84" width="896" height="672" fill="white">
  <!--
    Dromedary Camel + Rider — Full Gallop Profile (facing right)
    Distinctive features: single pronounced hump, long curved neck,
    long spindly legs, rider draped in keffiyeh streaming behind.
    All shapes filled white for Pixi.js tint via RGB multiply.
  -->

  <!-- ── Main body (lower, elongated — camels carry mass differently from horses) ── -->
  <path d="
    M 22,44
    C 38,40 58,40 72,42
    C 76,44 76,50 74,54
    C 62,58 42,58 28,56
    C 20,54 16,50 16,46
    C 15,44 18,43 22,44
    Z"/>

  <!-- Hindquarters rounded mass -->
  <ellipse cx="22" cy="48" rx="11" ry="12"/>

  <!-- Shoulder / diaphragm area -->
  <ellipse cx="70" cy="48" rx="10" ry="13"/>

  <!-- ── Hump (the defining silhouette element) ─────────────────── -->
  <!-- Hump base — wide -->
  <ellipse cx="46" cy="32" rx="21" ry="16"/>
  <!-- Hump peak — narrow, gives the pointed top -->
  <ellipse cx="46" cy="24" rx="12" ry="10"/>

  <!-- ── Neck (long S-curve, extends upward then forward) ─────── -->
  <path d="
    M 70,42
    C 74,34 80,24 82,16
    L 87,18
    C 85,24 79,36 75,46
    Z"/>
  <!-- Upper neck bulge for muscle definition -->
  <ellipse cx="82" cy="20" rx="6" ry="12" transform="rotate(12 82 20)"/>

  <!-- ── Head ─────────────────────────────────────────────────── -->
  <!-- Cranial mass -->
  <ellipse cx="88" cy="14" rx="10" ry="7" transform="rotate(-18 88 14)"/>
  <!-- Long camel muzzle / Roman nose (very characteristic) -->
  <ellipse cx="98" cy="22" rx="9" ry="5" transform="rotate(-8 98 22)"/>
  <!-- Prominent camel lip (split lower lip) -->
  <path d="M 97,26 C 100,26 103,25 103,24 C 103,26 101,28 98,28 Z"/>
  <!-- Nostril -->
  <ellipse cx="102" cy="23" rx="2" ry="1.2"/>
  <!-- Ear (small, pointed) -->
  <polygon points="83,8 86,2 90,9"/>
  <!-- Eye socket suggestion -->
  <ellipse cx="91" cy="14" rx="2" ry="1.5" opacity="0.8"/>

  <!-- ── Tail (short, tufted — camel's tail is nothing like a horse's) ── -->
  <path d="M 16,46 C 10,40 7,32 7,25 C 7,20 10,19 12,23 C 13,27 14,36 16,46 Z"/>
  <!-- Tail tuft (the classic bushy ball tip) -->
  <ellipse cx="9" cy="23" rx="5" ry="4"/>

  <!-- ── Four legs — camel gallop (rotary pattern, legs very long) ── -->
  <!-- Right foreleg — stretched wide forward -->
  <path d="M 72,54 L 77,56 L 84,74 L 80,76 Z"/>
  <ellipse cx="82" cy="76" rx="4" ry="2"/>

  <!-- Left foreleg — forward, smaller stride -->
  <path d="M 65,55 L 70,57 L 75,75 L 71,76 Z"/>
  <ellipse cx="73" cy="76" rx="4" ry="2"/>

  <!-- Right hindleg — kicked back -->
  <path d="M 30,55 L 26,57 L 20,74 L 24,76 Z"/>
  <ellipse cx="22" cy="76" rx="4" ry="2"/>

  <!-- Left hindleg — swept furthest back (camel gallop is wide) -->
  <path d="M 22,57 L 18,59 L 11,74 L 15,76 Z"/>
  <ellipse cx="13" cy="75" rx="4" ry="2"/>

  <!-- ── Rider ──────────────────────────────────────────────────── -->
  <!-- Seated high on the hump, slightly forward lean -->
  <ellipse cx="52" cy="17" rx="10" ry="7" transform="rotate(-12 52 17)"/>
  <!-- Head -->
  <circle cx="62" cy="9" r="5"/>
  <!-- Keffiyeh (close-fitting headscarf) -->
  <path d="M 58,7 C 62,3 68,5 70,8 C 68,12 60,13 57,10 Z"/>
  <!-- Keffiyeh cloth streaming back in wind (the rider IS moving fast) -->
  <path d="M 56,10
           C 50,14 44,18 40,23
           C 38,25 37,26 37,27"
        stroke="white" stroke-width="3.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <!-- Arm holding reins -->
  <path d="M 66,12 C 72,10 80,13 85,17"
        stroke="white" stroke-width="2" fill="none"
        stroke-linecap="round"/>
</svg>
