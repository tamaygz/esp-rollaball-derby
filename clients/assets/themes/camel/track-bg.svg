<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" preserveAspectRatio="xMidYMid slice">
  <!--
    Arabian Desert — Camel Race Track Lane Background
    Layers: sunset sky · distant dunes · mid dunes · sun · palm · sand track with ripples
    Warm palette: deep burnt-orange sky fading to gold on horizon, umber sand.
  -->
  <defs>
    <linearGradient id="cSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#BF360C"/>
      <stop offset="35%"  stop-color="#E64A19"/>
      <stop offset="65%"  stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="cDuneFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#E65100"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="cDuneMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="cSand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFD54F"/>
      <stop offset="50%"  stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <radialGradient id="cSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFF9C4"/>
      <stop offset="40%"  stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Desert sky (sunset) -->
  <rect width="800" height="100" fill="url(#cSky)"/>

  <!-- ── Sun near horizon ───────────────────────────────────────── -->
  <!-- Glow halo -->
  <ellipse cx="660" cy="46" rx="40" ry="30" fill="url(#cSun)" opacity="0.6"/>
  <!-- Sun disc (partially sunk below dune line) -->
  <circle cx="660" cy="46" r="16" fill="#FFEE58"/>
  <circle cx="660" cy="46" r="11" fill="#FFF9C4"/>

  <!-- ── Distant dune silhouettes ───────────────────────────────── -->
  <path d="M0,52 Q80,30 200,44 Q320,24 440,40 Q560,22 680,38 Q740,30 800,40 L800,100 L0,100 Z"
        fill="url(#cDuneFar)" opacity="0.55"/>

  <!-- ── Mid-ground dunes (more defined) ───────────────────────── -->
  <path d="M0,60 Q100,44 240,56 Q350,40 500,54 Q620,42 800,56 L800,100 L0,100 Z"
        fill="url(#cDuneMid)" opacity="0.8"/>

  <!-- ── Sand track surface ─────────────────────────────────────── -->
  <rect y="64" width="800" height="36" fill="url(#cSand)"/>

  <!-- Sand ripple marks (parallel wind-carved lines) -->
  <g fill="none" opacity="0.3">
    <path d="M0,70 Q200,68 400,70 Q600,68 800,70" stroke="#FF8F00"  stroke-width="1.2"/>
    <path d="M0,76 Q180,74 380,76 Q580,74 800,76" stroke="#E65100"  stroke-width="1.0"/>
    <path d="M0,83 Q220,81 440,83 Q640,81 800,83" stroke="#BF360C"  stroke-width="0.8"/>
    <path d="M0,91 Q300,89 600,91 Q720,89 800,91" stroke="#BF360C"  stroke-width="0.6"/>
  </g>

  <!-- Shadow under dune transition -->
  <rect y="63" width="800" height="3" fill="#BF360C" opacity="0.4"/>

  <!-- ── Palm tree silhouette (left side, decorative) ───────────── -->
  <g fill="#3E2723">
    <!-- Trunk (slight lean right, palm trees in desert lean) -->
    <path d="M96,64 Q98,52 96,42 Q95,38 97,38 Q99,38 98,42 Q100,52 99,64 Z"/>
    <!-- Fronds -->
    <path d="M97,40 Q86,28 73,30 Q74,32 85,33 Q97,38 97,40 Z"/>
    <path d="M97,40 Q108,26 122,28 Q121,30 108,32 Q97,38 97,40 Z"/>
    <path d="M97,40 Q89,34 92,22 Q94,23 94,34 Q97,38 97,40 Z"/>
    <path d="M97,40 Q106,32 104,20 Q102,21 101,32 Q98,38 97,40 Z"/>
    <path d="M97,40 Q84,36 86,30" stroke="#3E2723" stroke-width="2" fill="none"/>
  </g>

  <!-- Coconuts -->
  <g fill="#4E342E">
    <circle cx="93" cy="42" r="3"/>
    <circle cx="100" cy="40" r="2.5"/>
  </g>

  <!-- ── Distant camel herd silhouette (right, atmospheric depth) ── -->
  <g fill="#5D4037" opacity="0.35" transform="translate(640,50)">
    <!-- Tiny camel 1 -->
    <ellipse cx="0"  cy="8" rx="6" ry="3"/>
    <ellipse cx="2"  cy="4" rx="3" ry="4"/>
    <rect    x="-3"  y="10" width="2" height="5" rx="1"/>
    <rect    x="2"   y="10" width="2" height="5" rx="1"/>
    <!-- Tiny camel 2 -->
    <ellipse cx="20" cy="9" rx="5" ry="3"/>
    <ellipse cx="22" cy="5" rx="2.5" ry="3.5"/>
    <rect    x="17"  y="11" width="2" height="4" rx="1"/>
    <rect    x="22"  y="11" width="2" height="4" rx="1"/>
  </g>
</svg>
