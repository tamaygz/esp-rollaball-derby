<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" width="800" height="100" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Deep-space gradient: rich indigo void -->
    <linearGradient id="spaceBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#03001C"/>
      <stop offset="45%"  stop-color="#07003A"/>
      <stop offset="100%" stop-color="#060029"/>
    </linearGradient>

    <!-- Purple nebula cloud -->
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8B2BE2" stop-opacity="0.45"/>
      <stop offset="55%"  stop-color="#4A1280" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A0640" stop-opacity="0"/>
    </radialGradient>

    <!-- Blue-cyan nebula -->
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0077FF" stop-opacity="0.4"/>
      <stop offset="55%"  stop-color="#003B8A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000A20" stop-opacity="0"/>
    </radialGradient>

    <!-- Alien-green nebula -->
    <radialGradient id="neb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00E57A" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#005530" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#001A0D" stop-opacity="0"/>
    </radialGradient>

    <!-- Teal nebula (far right) -->
    <radialGradient id="neb4" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#001A2A" stop-opacity="0"/>
    </radialGradient>

    <!-- Gas-giant planet gradient (orange-red gas bands) -->
    <radialGradient id="gasGiant" cx="38%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#FF9B4A"/>
      <stop offset="40%"  stop-color="#D4520C"/>
      <stop offset="100%" stop-color="#6B1A00"/>
    </radialGradient>

    <!-- Gas giant ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B5200" stop-opacity="0.7"/>
      <stop offset="30%"  stop-color="#C47828" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#E8A040" stop-opacity="0.5"/>
      <stop offset="70%"  stop-color="#C47828" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8B5200" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Small distant planet (ice moon, blue) -->
    <radialGradient id="iceMoon" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#B8D8FF"/>
      <stop offset="60%"  stop-color="#3A6AC0"/>
      <stop offset="100%" stop-color="#1A2D60"/>
    </radialGradient>

    <!-- Comet tail gradient -->
    <linearGradient id="cometTail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#88CCFF" stop-opacity="0"/>
      <stop offset="60%"  stop-color="#AADDFF" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#FFFFFF"  stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="cometTail2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#88CCFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#88CCFF" stop-opacity="0.35"/>
    </linearGradient>

    <!-- Warp portal glow -->
    <radialGradient id="warpGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00FFCC" stop-opacity="0.7"/>
      <stop offset="40%"  stop-color="#00AAAA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#001A1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Alien ground glow (alien green) -->
    <radialGradient id="groundGlow" cx="50%" cy="80%" r="50%">
      <stop offset="0%"   stop-color="#00FF7A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#001A08" stop-opacity="0"/>
    </radialGradient>

    <!-- Galaxy spiral glow -->
    <radialGradient id="galaxyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FFEEAA" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#AA88FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#100020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ══ BACKGROUND ═══════════════════════════════════════════════ -->
  <rect width="800" height="100" fill="url(#spaceBg)"/>

  <!-- ══ NEBULA LAYERS (drawn first, large soft blobs) ════════════ -->
  <ellipse cx="160"  cy="48"  rx="200" ry="65" fill="url(#neb1)"/>
  <ellipse cx="490"  cy="42"  rx="240" ry="70" fill="url(#neb2)"/>
  <ellipse cx="420"  cy="55"  rx="180" ry="55" fill="url(#neb1)" opacity="0.5"/>
  <ellipse cx="700"  cy="50"  rx="170" ry="60" fill="url(#neb3)"/>
  <ellipse cx="760"  cy="35"  rx="120" ry="40" fill="url(#neb4)" opacity="0.7"/>

  <!-- ══ GALAXY SPIRAL (small bright core, far background) ════════ -->
  <g transform="translate(355,30)">
    <ellipse cx="0" cy="0" rx="22" ry="22" fill="url(#galaxyGlow)"/>
    <!-- Spiral arms (thin arcs) -->
    <path d="M 0,0 Q 8,-6 14,-1 Q 20,5 16,14 Q 12,22 3,20"
          fill="none" stroke="#AA88FF" stroke-width="1.8" opacity="0.45"
          stroke-linecap="round"/>
    <path d="M 0,0 Q -8,6 -14,1 Q -20,-5 -16,-14 Q -12,-22 -3,-20"
          fill="none" stroke="#AA88FF" stroke-width="1.5" opacity="0.35"
          stroke-linecap="round"/>
    <!-- Bright nucleus -->
    <circle cx="0" cy="0" r="3.5" fill="#FFEECC" opacity="0.85"/>
    <circle cx="0" cy="0" r="1.5" fill="#FFFFFF"  opacity="0.9"/>
  </g>

  <!-- ══ STARS — scattered across full width ══════════════════════ -->
  <!-- Row 1: upper band -->
  <circle cx="8"   cy="7"  r="1.3" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="22"  cy="18" r="0.8" fill="#CCDDFF" opacity="0.8"/>
  <circle cx="44"  cy="5"  r="1.6" fill="#FFFFFF" opacity="1"/>
  <circle cx="72"  cy="22" r="0.9" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="90"  cy="8"  r="1.1" fill="#FFFFCC" opacity="0.85"/>
  <circle cx="112" cy="32" r="0.7" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="135" cy="11" r="1.4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="158" cy="26" r="0.8" fill="#DDEEFF" opacity="0.7"/>
  <circle cx="180" cy="9"  r="1.2" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="205" cy="38" r="0.9" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="228" cy="14" r="1.5" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="252" cy="28" r="0.7" fill="#CCCCFF" opacity="0.75"/>
  <circle cx="275" cy="6"  r="1.1" fill="#FFFFFF" opacity="0.88"/>
  <circle cx="298" cy="20" r="1.3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="322" cy="11" r="0.9" fill="#FFFFCC" opacity="0.85"/>
  <circle cx="342" cy="38" r="0.7" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="372" cy="8"  r="1.4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="398" cy="30" r="0.8" fill="#DDEEFF" opacity="0.75"/>
  <circle cx="420" cy="12" r="1.1" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="444" cy="24" r="1.6" fill="#FFFFFF" opacity="1"/>
  <circle cx="468" cy="7"  r="0.9" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="492" cy="35" r="0.8" fill="#CCDDFF" opacity="0.8"/>
  <circle cx="515" cy="15" r="1.3" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="538" cy="28" r="1"   fill="#FFFFDD" opacity="0.85"/>
  <circle cx="562" cy="6"  r="1.5" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="585" cy="22" r="0.8" fill="#CCCCFF" opacity="0.7"/>
  <circle cx="608" cy="10" r="1.2" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="632" cy="32" r="0.9" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="655" cy="14" r="1.4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="678" cy="26" r="0.7" fill="#AACCFF" opacity="0.7"/>
  <circle cx="702" cy="9"  r="1.3" fill="#FFFFFF" opacity="0.88"/>
  <circle cx="724" cy="38" r="0.9" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="748" cy="12" r="1.6" fill="#FFFFFF" opacity="1"/>
  <circle cx="772" cy="30" r="0.8" fill="#DDEEFF" opacity="0.8"/>
  <circle cx="792" cy="16" r="1.1" fill="#FFFFFF" opacity="0.85"/>
  <!-- Row 2: middle band -->
  <circle cx="30"  cy="52" r="0.9" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="62"  cy="45" r="1.1" fill="#CCDDFF" opacity="0.75"/>
  <circle cx="105" cy="55" r="0.7" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="148" cy="48" r="1.2" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="198" cy="60" r="0.8" fill="#AACCFF" opacity="0.65"/>
  <circle cx="240" cy="50" r="1"   fill="#FFFFFF" opacity="0.75"/>
  <circle cx="285" cy="44" r="0.7" fill="#FFFFCC" opacity="0.7"/>
  <circle cx="330" cy="58" r="1.3" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="382" cy="52" r="0.9" fill="#CCCCFF" opacity="0.7"/>
  <circle cx="430" cy="46" r="1.1" fill="#FFFFFF" opacity="0.78"/>
  <circle cx="478" cy="57" r="0.8" fill="#FFFFFF" opacity="0.65"/>
  <circle cx="524" cy="44" r="1.4" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="572" cy="54" r="0.7" fill="#DDEEFF" opacity="0.7"/>
  <circle cx="618" cy="48" r="1"   fill="#FFFFFF" opacity="0.8"/>
  <circle cx="663" cy="55" r="1.2" fill="#FFFFFF" opacity="0.82"/>
  <circle cx="710" cy="46" r="0.8" fill="#CCDDFF" opacity="0.7"/>
  <circle cx="756" cy="52" r="1.1" fill="#FFFFFF" opacity="0.78"/>
  <!-- Row 3: lower band (sparse) -->
  <circle cx="50"  cy="74" r="0.8" fill="#AACCFF" opacity="0.5"/>
  <circle cx="120" cy="78" r="0.7" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="230" cy="72" r="0.9" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="340" cy="80" r="0.7" fill="#CCCCFF" opacity="0.4"/>
  <circle cx="450" cy="74" r="0.8" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="560" cy="70" r="0.6" fill="#AACCFF" opacity="0.45"/>
  <circle cx="670" cy="78" r="0.9" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="780" cy="73" r="0.7" fill="#FFFFFF" opacity="0.42"/>

  <!-- ══ BRIGHT TWINKLE STARS (4-point cross) ══════════════════════ -->
  <line x1="54"  y1="16" x2="54"  y2="8"  stroke="#FFFFFF" stroke-width="1.4" opacity="0.8"/>
  <line x1="50"  y1="12" x2="58"  y2="12" stroke="#FFFFFF" stroke-width="1.4" opacity="0.8"/>
  <circle cx="54" cy="12" r="1.8" fill="#FFFFFF" opacity="0.9"/>

  <line x1="310" y1="18" x2="310" y2="10" stroke="#FFFFAA" stroke-width="1.2" opacity="0.7"/>
  <line x1="306" y1="14" x2="314" y2="14" stroke="#FFFFAA" stroke-width="1.2" opacity="0.7"/>
  <circle cx="310" cy="14" r="1.5" fill="#FFFFCC" opacity="0.85"/>

  <line x1="590" y1="20" x2="590" y2="12" stroke="#AACCFF" stroke-width="1.2" opacity="0.65"/>
  <line x1="586" y1="16" x2="594" y2="16" stroke="#AACCFF" stroke-width="1.2" opacity="0.65"/>
  <circle cx="590" cy="16" r="1.5" fill="#CCDDFF" opacity="0.8"/>

  <line x1="735" y1="22" x2="735" y2="14" stroke="#FFFFFF" stroke-width="1.3" opacity="0.75"/>
  <line x1="731" y1="18" x2="739" y2="18" stroke="#FFFFFF" stroke-width="1.3" opacity="0.75"/>
  <circle cx="735" cy="18" r="1.6" fill="#FFFFFF" opacity="0.9"/>

  <!-- ══ COMET with glowing tail ═══════════════════════════════════ -->
  <!-- Main tail beam -->
  <path d="M 155,28 L 268,18" stroke="url(#cometTail)"  stroke-width="3"   stroke-linecap="round" opacity="0.8"/>
  <!-- Secondary broader tail -->
  <path d="M 148,32 L 265,20" stroke="url(#cometTail2)" stroke-width="5"   stroke-linecap="round"/>
  <path d="M 162,26 L 266,19" stroke="url(#cometTail2)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Comet nucleus -->
  <circle cx="269" cy="18" r="4"   fill="#FFFFFF"  opacity="0.95"/>
  <circle cx="269" cy="18" r="7"   fill="#AADDFF"  opacity="0.45"/>
  <circle cx="269" cy="18" r="11"  fill="#6699FF"  opacity="0.18"/>

  <!-- ══ GAS GIANT PLANET (left quadrant) ═════════════════════════ -->
  <!-- Planet ring (behind planet) -->
  <ellipse cx="88" cy="58" rx="46" ry="10" fill="url(#ringGrad)"/>
  <!-- Planet body -->
  <circle  cx="88" cy="55" r="24"           fill="url(#gasGiant)"/>
  <!-- Surface band lines (storm belts) -->
  <path d="M 64,50 Q 88,46 112,50" stroke="#FF6A00" stroke-width="3"   fill="none" opacity="0.5"/>
  <path d="M 64,56 Q 88,52 112,56" stroke="#8B2000" stroke-width="2.5" fill="none" opacity="0.45"/>
  <path d="M 66,62 Q 88,65 110,62" stroke="#FF8030" stroke-width="2"   fill="none" opacity="0.35"/>
  <!-- Great storm eye -->
  <ellipse cx="96" cy="53" rx="7" ry="4.5" fill="#CC3300" opacity="0.6"/>
  <ellipse cx="96" cy="53" rx="4" ry="2.5" fill="#FF5500" opacity="0.5"/>
  <!-- Planet ring front arc (over planet) -->
  <path d="M 63,57 A 46,10 0 0 0 113,57" stroke="#D4902A" stroke-width="2.5" fill="none" opacity="0.7"/>

  <!-- ══ SMALL ICE-BLUE MOON ════════════════════════════════════════ -->
  <circle cx="135" cy="68" r="12" fill="url(#iceMoon)"/>
  <!-- Moon surface crater suggestions -->
  <circle cx="130" cy="65" r="3.5" fill="#2A5AB0" opacity="0.5"/>
  <circle cx="140" cy="70" r="2.5" fill="#2A5AB0" opacity="0.45"/>
  <circle cx="133" cy="72" r="2"   fill="#2A5AB0" opacity="0.4"/>

  <!-- ══ ASTEROID CLUSTER (centre-right band) ══════════════════════ -->
  <g transform="translate(512,22)">
    <!-- Main large asteroid -->
    <path d="M 0,0 L 16,5 L 18,18 L 8,24 L -5,20 L -8,7 Z"
          fill="#5A5A5A"/>
    <!-- Dark face shading -->
    <path d="M 0,0 L 16,5 L 18,18 L 8,24 L -5,20 L -8,7 Z"
          fill="#2A2A2A" opacity="0.45"/>
    <!-- Bright edge highlight -->
    <path d="M 0,0 L 16,5 L 18,18" stroke="#888888" stroke-width="1.2" fill="none" opacity="0.7"/>
    <!-- Surface crack -->
    <path d="M 4,4 L 8,14 L 5,20" stroke="#888888" stroke-width="0.8" fill="none" opacity="0.5"/>
    <!-- Medium asteroid -->
    <path d="M 22,2 L 32,8 L 30,18 L 20,19 L 18,10 Z"
          fill="#4A4A4A" transform="translate(2,-2)"/>
    <path d="M 24,0 L 34,6 L 32,16" stroke="#777777" stroke-width="0.9" fill="none" opacity="0.6" transform="translate(2,-2)"/>
    <!-- Small pebbles -->
    <circle cx="-10" cy="18" r="5"   fill="#444444"/>
    <circle cx="-12" cy="10" r="3"   fill="#3C3C3C"/>
    <circle cx="38"  cy="15" r="4"   fill="#505050"/>
    <circle cx="42"  cy="5"  r="2.5" fill="#484848"/>
    <!-- Crystal shards (glowing) -->
    <polygon points="30,-2 38,10 24,8" fill="#9988FF" opacity="0.75"/>
    <polygon points="26,-6 34,4  22,4" fill="#BBAAFF" opacity="0.6"/>
    <circle  cx="30" cy="4"  r="2"   fill="#FFFFFF"   opacity="0.7"/>
    <!-- Dust sparkles around asteroid -->
    <circle cx="-3"  cy="2"  r="0.9" fill="#AAAAAA" opacity="0.6"/>
    <circle cx="20"  cy="23" r="0.7" fill="#AAAAAA" opacity="0.5"/>
    <circle cx="45"  cy="20" r="0.8" fill="#AAAAAA" opacity="0.55"/>
  </g>

  <!-- ══ ALIEN CROP CIRCLE / LANDING RING (floor, centre) ═════════ -->
  <ellipse cx="390" cy="94" rx="32" ry="6"   fill="none" stroke="#00FF88" stroke-width="2"   opacity="0.7"/>
  <ellipse cx="390" cy="94" rx="22" ry="4"   fill="none" stroke="#00DD77" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="390" cy="94" rx="12" ry="2.2" fill="none" stroke="#00FF88" stroke-width="0.8" opacity="0.4"/>
  <!-- Green abduction beam glow from ground -->
  <ellipse cx="390" cy="97" rx="45" ry="10" fill="url(#groundGlow)" opacity="0.9"/>

  <!-- ══ WARP PORTAL / TELEPORT RINGS (right-centre area) ═════════ -->
  <ellipse cx="685" cy="50" rx="28" ry="24" fill="url(#warpGlow)"   opacity="0.5"/>
  <ellipse cx="685" cy="50" rx="26" ry="22" fill="none" stroke="#00FFCC" stroke-width="3"   opacity="0.8"/>
  <ellipse cx="685" cy="50" rx="19" ry="16" fill="none" stroke="#00DDFF" stroke-width="2"   opacity="0.65"/>
  <ellipse cx="685" cy="50" rx="12" ry="10" fill="none" stroke="#AAFFEE" stroke-width="1.5" opacity="0.5"/>
  <!-- Portal interior (dark with faint stars inside) -->
  <ellipse cx="685" cy="50" rx="10" ry="8.5" fill="#000C14" opacity="0.85"/>
  <circle  cx="683" cy="48" r="1.2" fill="#FFFFFF"  opacity="0.7"/>
  <circle  cx="688" cy="52" r="0.8" fill="#AAFFCC"  opacity="0.6"/>
  <circle  cx="686" cy="45" r="0.6" fill="#FFFFFF"  opacity="0.5"/>
  <!-- Portal sparkle nodes (energy points around ring) -->
  <circle cx="685" cy="28" r="3"   fill="#00FFCC" opacity="0.9"/>
  <circle cx="711" cy="50" r="2.5" fill="#00FFCC" opacity="0.8"/>
  <circle cx="685" cy="72" r="3"   fill="#00FFCC" opacity="0.9"/>
  <circle cx="659" cy="50" r="2.5" fill="#00FFCC" opacity="0.8"/>
  <!-- Corner nodes (at diagonals) -->
  <circle cx="704" cy="35" r="2"   fill="#00DDFF" opacity="0.7"/>
  <circle cx="704" cy="65" r="2"   fill="#00DDFF" opacity="0.7"/>
  <circle cx="666" cy="35" r="2"   fill="#00DDFF" opacity="0.7"/>
  <circle cx="666" cy="65" r="2"   fill="#00DDFF" opacity="0.7"/>

  <!-- ══ ALIEN PLANTS / FLORA (right side scatter) ═════════════════ -->
  <!-- Plant stem 1 -->
  <line x1="744" y1="100" x2="744" y2="80" stroke="#00AA44" stroke-width="2" opacity="0.7"/>
  <path d="M 740,88 Q 735,82 730,85" stroke="#00BB55" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <circle cx="730" cy="85" r="4"   fill="#00DD66" opacity="0.75"/>
  <circle cx="744" cy="78" r="5"   fill="#00CC55" opacity="0.8"/>
  <circle cx="744" cy="78" r="2.5" fill="#00FF77" opacity="0.7"/>
  <!-- Plant stem 2 -->
  <line x1="758" y1="100" x2="756" y2="84" stroke="#00AA44" stroke-width="1.5" opacity="0.65"/>
  <circle cx="756" cy="82" r="4"   fill="#009933" opacity="0.7"/>
  <!-- Floating star sparkles -->
  <circle cx="775" cy="72" r="2.5" fill="#FFEE44" opacity="0.85"/>
  <circle cx="769" cy="64" r="1.8" fill="#FFDD33" opacity="0.75"/>
  <circle cx="782" cy="68" r="1.5" fill="#FFFF66" opacity="0.7"/>
  <!-- Star cross sparkle -->
  <line x1="775" y1="72" x2="775" y2="67" stroke="#FFEE44" stroke-width="1.2" opacity="0.7"/>
  <line x1="772" y1="69" x2="778" y2="69" stroke="#FFEE44" stroke-width="1.2" opacity="0.7"/>

  <!-- ══ SATELLITE / SPACE STATION SILHOUETTE ══════════════════════ -->
  <g transform="translate(194,42)" opacity="0.7">
    <!-- Main body -->
    <rect x="-6" y="-4" width="12" height="8" rx="1.5" fill="#6666AA"/>
    <rect x="-4" y="-2" width="8"  height="4" rx="1"   fill="#8888CC"/>
    <!-- Solar panels (left) -->
    <rect x="-20" y="-2" width="12" height="4" rx="0.5" fill="#4455BB"/>
    <line x1="-14" y1="-2" x2="-14" y2="2" stroke="#3344AA" stroke-width="0.8" opacity="0.7"/>
    <line x1="-11" y1="-2" x2="-11" y2="2" stroke="#3344AA" stroke-width="0.8" opacity="0.7"/>
    <!-- Solar panels (right) -->
    <rect x="8"  y="-2" width="12" height="4" rx="0.5" fill="#4455BB"/>
    <line x1="11" y1="-2" x2="11" y2="2" stroke="#3344AA" stroke-width="0.8" opacity="0.7"/>
    <line x1="14" y1="-2" x2="14" y2="2" stroke="#3344AA" stroke-width="0.8" opacity="0.7"/>
    <!-- Antenna -->
    <line x1="0" y1="-4" x2="0" y2="-10" stroke="#8888AA" stroke-width="1.2" opacity="0.8"/>
    <circle cx="0" cy="-11" r="1.8" fill="#AAAACC" opacity="0.8"/>
    <!-- Blinking light -->
    <circle cx="4" cy="0" r="1.2" fill="#FF3333" opacity="0.9"/>
  </g>

  <!-- ══ GROUND LAYER (bottom edge) ══════════════════════════════ -->
  <!-- Deep space floor horizon line -->
  <rect x="0" y="92" width="800" height="1.5" fill="#1A1A4A" opacity="0.7"/>
  <!-- Subtle sci-fi grid pattern on floor -->
  <line x1="0" y1="96" x2="800" y2="96" stroke="#0D0D3A" stroke-width="1" opacity="0.5"/>
  <!-- Glowing floor nodes / pads -->
