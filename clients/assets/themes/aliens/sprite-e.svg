  <path d="M 35.5,14.5 Q 42,10 48.5,14.5" fill="none" stroke="#383838" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 53.5,14.5 Q 60,10 66.5,14.5" fill="none" stroke="#383838" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Thick-frame glasses -->
  <rect x="33" y="18" width="16" height="11" rx="2.5" fill="none" stroke="#2e2e2e" stroke-width="2.4"/>
  <rect x="51" y="18" width="16" height="11" rx="2.5" fill="none" stroke="#2e2e2e" stroke-width="2.4"/>
  <rect x="49" y="22" width="2" height="3" fill="#2e2e2e" rx="0.5"/>
  <rect x="31" y="21.5" width="2" height="2.5" fill="#2e2e2e" rx="0.5"/>
  <rect x="67" y="21.5" width="2" height="2.5" fill="#2e2e2e" rx="0.5"/>
  <!-- Nose -->
  <ellipse cx="51" cy="31.5" rx="2.4" ry="1.6" fill="#b6b6b6"/>
  <!-- Slight knowing smile -->
  <path d="M 40,35.5 Q 45.5,43.5 51,40 Q 56.5,43.5 62,35.5" stroke="#888888" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 40,35.5 Q 45.5,43.5 51,40 Q 56.5,43.5 62,35.5 L 62.5,37 Q 57,45 51,41.5 Q 45,45 39.5,37 Z" fill="#c8c8c8" opacity="0.28"/>
  <!-- Rosy cheeks -->
  <ellipse cx="37" cy="33.5" rx="5" ry="3" fill="#d6d6d6" opacity="0.62"/>
  <ellipse cx="65" cy="33.5" rx="5" ry="3" fill="#d6d6d6" opacity="0.62"/>
  <!-- Antenna -->
  <line x1="57" y1="22" x2="60" y2="10.5" stroke="#c8c8c8" stroke-width="2.8" stroke-linecap="round"/>
  <circle cx="61" cy="9" r="5.5" fill="url(#anG)"/>
  <circle cx="59" cy="7" r="2.2" fill="#f8f8f8"/>
  <circle cx="61" cy="9" r="9.5" fill="none" stroke="#d0d0d0" stroke-width="1.4"/>
  <circle cx="61" cy="9" r="14" fill="none" stroke="#c2c2c2" stroke-width="0.9"/>
  <!-- Dome shine -->
  <path d="M 32,26 Q 33,11 49,9.5 Q 43,14.5 36,27 Z" fill="#f8f8f8" opacity="0.80"/>
  <circle cx="37.5" cy="16.5" r="3.4" fill="#ffffff" opacity="0.88"/>
  <circle cx="44.5" cy="11.5" r="1.8" fill="#f6f6f6" opacity="0.82"/>
  <path d="M 67,28.5 Q 67,43 51,46 Q 59,41 65,30 Z" fill="#a8a8a8" opacity="0.20"/>
