  <path d="M 36,32 L 36,26 L 42,26 L 42,22" fill="none" stroke="#484848" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 42,22 L 48,22 L 48,18" fill="none" stroke="#484848" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 36,26 L 33,26 L 33,20" fill="none" stroke="#484848" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 58,30 L 58,24 L 64,24 L 64,20" fill="none" stroke="#484848" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M 58,24 L 54,24 L 54,18" fill="none" stroke="#484848" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <circle cx="42" cy="22" r="1.2" fill="#484848" opacity="0.5"/>
  <circle cx="48" cy="18" r="1.2" fill="#484848" opacity="0.5"/>
  <circle cx="33" cy="20" r="1.2" fill="#484848" opacity="0.5"/>
  <circle cx="64" cy="20" r="1.2" fill="#484848" opacity="0.5"/>
  <circle cx="54" cy="18" r="1.2" fill="#484848" opacity="0.5"/>
  <!-- Alien torso -->
  <ellipse cx="51" cy="44" rx="11" ry="7.5" fill="url(#aG)"/>
  <ellipse cx="51" cy="40.5" rx="9" ry="3.2" fill="#cccccc"/>
  <ellipse cx="51" cy="39" rx="7.5" ry="1.9" fill="#e4e4e4"/>
  <!-- Alien head -->
  <ellipse cx="51" cy="24.5" rx="14" ry="15" fill="url(#aG)"/>
  <!-- Ears -->
  <polygon points="37,19 29.5,3.5 41,17.5" fill="#f0f0f0"/><polygon points="37,19 32,9 39,17.5" fill="#d2d2d2"/>
  <polygon points="65,19 72.5,3.5 61,17.5" fill="#f0f0f0"/><polygon points="65,19 70,9 63,17.5" fill="#d2d2d2"/>
