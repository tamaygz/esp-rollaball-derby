  <ellipse cx="51" cy="48.5" rx="24.5" ry="5.8" fill="url(#cG)"/>
  <ellipse cx="51" cy="46.5" rx="21.5" ry="3.8" fill="#d2d2d2"/>
  <circle cx="31" cy="47.5" r="1.6" fill="#e6e6e6"/>
  <circle cx="51" cy="49.5" r="1.6" fill="#e6e6e6"/>
  <circle cx="71" cy="47.5" r="1.6" fill="#e6e6e6"/>
  <!-- Rim lights -->
  <circle cx="16.5" cy="53.5" r="5.8" fill="#d6d6d6"/><circle cx="16.5" cy="53.5" r="4"/><circle cx="15.5" cy="51.8" r="1.6" fill="#f6f6f6"/>
  <circle cx="32" cy="58.5" r="5" fill="#d6d6d6"/><circle cx="32" cy="58.5" r="3.4"/><circle cx="31" cy="57" r="1.4" fill="#f6f6f6"/>
  <circle cx="51" cy="61" r="5" fill="#d6d6d6"/><circle cx="51" cy="61" r="3.4"/><circle cx="50" cy="59.5" r="1.4" fill="#f6f6f6"/>
  <circle cx="70" cy="58.5" r="5" fill="#d6d6d6"/><circle cx="70" cy="58.5" r="3.4"/><circle cx="69" cy="57" r="1.4" fill="#f6f6f6"/>
  <circle cx="85.5" cy="53.5" r="5.8" fill="#d6d6d6"/><circle cx="85.5" cy="53.5" r="4"/>
</svg>
