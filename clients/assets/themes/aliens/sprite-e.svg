  <ellipse cx="60" cy="22" rx="7.2" ry="8.5" fill="#f4f4f4"/>
  <ellipse cx="42" cy="22.5" rx="5.6" ry="6.8" fill="url(#irG)"/>
  <ellipse cx="60" cy="22.5" rx="5.6" ry="6.8" fill="url(#irG)"/>
  <ellipse cx="42.8" cy="23.5" rx="3.9" ry="4.8" fill="url(#pG)"/>
  <ellipse cx="60.8" cy="23.5" rx="3.9" ry="4.8" fill="url(#pG)"/>
  <circle cx="40" cy="19.5" r="2.6" fill="#ffffff"/>
  <circle cx="58" cy="19.5" r="2.6" fill="#ffffff"/>
  <circle cx="44.5" cy="27" r="1.3" fill="#c8c8c8"/>
  <circle cx="62.5" cy="27" r="1.3" fill="#c8c8c8"/>
