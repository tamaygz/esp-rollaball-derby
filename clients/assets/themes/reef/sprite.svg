<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="640" height="640" fill="white">
  <!--
    Octopus — top-down / slight front-angle silhouette (facing right)
    Tintable: all fills white for Pixi.js RGB-multiply tinting.
    Features: round mantle, large eyes, 8 undulating tentacles radiating outward.
  -->

  <!-- ── Mantle (main body dome) ──────────────────────────────── -->
  <ellipse cx="40" cy="28" rx="18" ry="22"/>

  <!-- ── Head / eye bulge area ──────────────────────────────────── -->
  <!-- Wide cheeks connecting mantle to tentacle base -->
  <ellipse cx="40" cy="44" rx="20" ry="9"/>

  <!-- ── Eyes (dark pupils cut out via background color won't work for tint)
       Use slightly-grey circles so they show as subtle grey under tint ──── -->
  <!-- Eye sockets — filled white (same as body) so tint colours them uniformly,
       pupils defined as slightly smaller circles filled ~30% grey = will show as
       dark spots on bright tints due to multiply -->
  <circle cx="33" cy="24" r="5.5"/>
  <circle cx="47" cy="24" r="5.5"/>
  <!-- Pupils — 40% white (hex ~666 = 0.4×255) gives visible dark spot -->
  <circle cx="33" cy="24" r="2.8" fill="#666666"/>
  <circle cx="47" cy="24" r="2.8" fill="#666666"/>
  <!-- Eye highlight -->
  <circle cx="31.5" cy="22.5" r="1.2" fill="#bbbbbb"/>
  <circle cx="45.5" cy="22.5" r="1.2" fill="#bbbbbb"/>

  <!-- ── Tentacles — 8 arms radiating from bottom/sides of head ──── -->
  <!-- Each tentacle: base connects at mantle edge, tapers to a point,
       with slight S-curve wave for organic feel.
       Arms spread: far-left, left, front-left, front, front-right, right, far-right, back-left, back-right -->

  <!-- Arm 1 — far left, curves down-left -->
  <path d="M 24,46
    C 16,52 10,58 8,68
    C 7,72 9,74 11,72
    C 12,68 16,62 22,56
    C 26,52 26,50 24,46 Z"/>

  <!-- Arm 2 — left -->
  <path d="M 27,49
    C 20,56 16,64 15,72
    C 14.5,75 17,76 18,73
    C 19,68 22,60 28,54
    C 30,52 30,50 27,49 Z"/>

  <!-- Arm 3 — front-left -->
  <path d="M 33,52
    C 29,60 27,68 28,76
    C 28.5,79 31,79 31.5,76
    C 32,70 33,62 36,55
    C 37,52 36,51 33,52 Z"/>

  <!-- Arm 4 — front-centre-left -->
  <path d="M 38,53
    C 36,61 36,69 38,77
    C 38.5,80 41,80 41,77
    C 41,69 40,61 39,53
    C 39,52 38,52 38,53 Z"/>

  <!-- Arm 5 — front-centre-right -->
  <path d="M 43,53
    C 44,61 44,69 42,77
    C 41.5,80 44,80 44.5,77
    C 46,69 45,61 44,53
    C 44,52 43,52 43,53 Z"/>

  <!-- Arm 6 — front-right -->
  <path d="M 47,52
    C 51,60 53,68 52,76
    C 51.5,79 49,79 48.5,76
    C 48,70 47,62 44,55
    C 43,52 44,51 47,52 Z"/>

  <!-- Arm 7 — right -->
  <path d="M 53,49
    C 60,56 64,64 65,72
    C 65.5,75 63,76 62,73
    C 61,68 58,60 52,54
    C 50,52 50,50 53,49 Z"/>

  <!-- Arm 8 — far right, curves down-right -->
  <path d="M 56,46
    C 64,52 70,58 72,68
    C 73,72 71,74 69,72
    C 68,68 64,62 58,56
    C 54,52 54,50 56,46 Z"/>

  <!-- ── Sucker row hints on front two arms (subtle texture) ──── -->
  <!-- Small ellipses along arm 4 -->
  <ellipse cx="38.5" cy="58" rx="1.2" ry="1" fill="#aaaaaa"/>
  <ellipse cx="38.8" cy="63" rx="1.2" ry="1" fill="#aaaaaa"/>
  <ellipse cx="39"   cy="68" rx="1.2" ry="1" fill="#aaaaaa"/>
  <!-- Small ellipses along arm 5 -->
  <ellipse cx="43.5" cy="58" rx="1.2" ry="1" fill="#aaaaaa"/>
  <ellipse cx="43.2" cy="63" rx="1.2" ry="1" fill="#aaaaaa"/>
  <ellipse cx="43"   cy="68" rx="1.2" ry="1" fill="#aaaaaa"/>

</svg>
