; PlatformIO project configuration for Roll-a-Ball Derby — ESP8266 Sensor Client
; Two board targets:
;   d1_mini   — Wemos D1 Mini (CP2104 USB, 921600 upload)
;   nodemcuv2 — NodeMCU v3 / NodeMCU 1.0 (CH340 USB, 115200 upload)
; https://docs.platformio.org/en/stable/boards/espressif8266/d1_mini.html
; https://docs.platformio.org/en/stable/boards/espressif8266/nodemcuv2.html

; Shared settings inherited by all named environments
[env]
framework              = arduino
monitor_speed          = 115200
board_build.filesystem = littlefs

lib_deps =
    symlink://${PROJECT_DIR}/../shared/leds
    symlink://${PROJECT_DIR}/../shared/io
    gilmaimon/ArduinoWebsockets@^0.5.4
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
    makuna/NeoPixelBus@^2.7.0

build_flags =
    -I../shared

[env:d1_mini]
platform     = espressif8266
board        = d1_mini
upload_speed = 921600
build_src_filter = +<*> -<diag_main.cpp>

; NodeMCU v3 uses the nodemcuv2 board ID in PlatformIO.
; The v3 hardware is identical to v2 (same ESP-12E module), differing only
; in the USB-to-serial chip (CH340 vs CP2102) which requires a slower baud.
[env:nodemcuv2]
platform     = espressif8266
board        = nodemcuv2
upload_speed = 115200
build_src_filter = +<*> -<diag_main.cpp>

; ESP32 DevKit — standard 38-pin development board with USB-to-serial (CP2102/CH340).
; Flash with 921600 baud; monitor at 115200 (same as ESP8266 targets).
[env:esp32dev]
platform     = espressif32
board        = esp32dev
upload_speed = 921600
build_src_filter = +<*> -<diag_main.cpp>

; ─── Native unit-test environment ──────────────────────────────────────────────
; Runs pure C++ tests (no hardware, no Arduino SDK) using PlatformIO's built-in
; Unity test runner on the host machine.
;
; Tests live in test/test_event_queue/ and test/test_animation_manager/.
; Run with:  pio test -e native_test
;
; No lib_deps: we include shared headers directly via -I flags so that only the
; headers under test are compiled (not the full NeoPixelBus / Arduino library
; tree, which requires real hardware targets).
[env:native_test]
platform        = native
framework       =
build_flags     =
    -std=c++11
    -I ../shared
    -I ../shared/leds
    -I ../shared/io
    -I test/mocks
    -DNATIVE_TEST
test_build_src  = no
test_filter     =
    test_event_queue
    test_animation_manager

; Builds ONLY diag_main.cpp (ignores all other src files).
; Flash with:  pio run -e diag -t upload && pio device monitor
; Remove this env + diag_main.cpp when done debugging.
[env:diag]
platform       = espressif8266
board          = nodemcuv2
upload_speed   = 115200
build_src_filter =
    -<*>
    +<diag_main.cpp>
