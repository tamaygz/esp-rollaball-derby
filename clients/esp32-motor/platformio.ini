; PlatformIO project configuration for Roll-a-Ball Derby — ESP32 Motor/Peripheral Controller
; Board: ESP32-S3-WROOM-1 N16R8 (16 MB flash, 8 MB OctalSPI PSRAM)
; Platform: espressif32  |  Framework: Arduino
; https://docs.platformio.org/en/stable/boards/espressif32/esp32-s3-devkitc-1.html

[env]
platform               = espressif32
framework              = arduino
monitor_speed          = 115200
board_build.filesystem = littlefs

lib_deps =
    symlink://${PROJECT_DIR}/../shared/leds
    symlink://${PROJECT_DIR}/../shared/io
    gilmaimon/ArduinoWebsockets@^0.5.4
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
    makuna/NeoPixelBus@^2.7.0
    waspinator/AccelStepper@^1.64
    pschatzmann/ESP32-A2DP@^1.8.4

build_flags =
    -I../shared
    -DBOARD_HAS_PSRAM
    -DCONFIG_BT_ENABLED
    -DCONFIG_CLASSIC_BT_ENABLED

[env:esp32dev]
board        = esp32dev
upload_speed = 921600
