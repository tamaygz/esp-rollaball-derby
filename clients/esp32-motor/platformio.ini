; PlatformIO project configuration for Roll-a-Ball Derby — ESP32 Motor/Peripheral Controller
; Board options:
;   esp32dev    — generic ESP32 DevKit v1
;   esp32-s3    — ESP32-S3-WROOM-1 N16R8 (16 MB flash, 8 MB OctalSPI PSRAM)
; Platform: espressif32  |  Framework: Arduino

[env]
platform               = espressif32
framework              = arduino
monitor_speed          = 115200
board_build.filesystem = littlefs

lib_deps =
    symlink://${PROJECT_DIR}/../shared/leds
    symlink://${PROJECT_DIR}/../shared/io
    gilmaimon/ArduinoWebsockets@^0.5.4
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
    makuna/NeoPixelBus@^2.7.0
    waspinator/AccelStepper@^1.64

build_flags =
    -I../shared
    -DBOARD_HAS_PSRAM

[env:esp32-s3]
board                           = esp32-s3-devkitc-1
upload_port                     = COM8
monitor_port                    = COM8
upload_speed                    = 921600
; N16R8: 16 MB flash, 8 MB OctalSPI PSRAM (no Classic BT — A2DP not available)
board_build.flash_mode          = qio
board_build.flash_size          = 16MB
board_upload.flash_size         = 16MB
board_build.partitions          = default_16MB.csv
board_build.arduino.memory_type = qio_opi

[env:esp32dev]
board                   = esp32dev
upload_speed            = 921600
; BT+A2DP brings firmware to ~1.86 MB, so the default 1.25 MB app partition is too small.
; min_spiffs.csv gives a 1.875 MB app partition (128 KB SPIFFS).
board_build.partitions  = min_spiffs.csv
; Classic Bluetooth + A2DP only available on original ESP32.
; lib_deps replaces [env] lib_deps when defined here, so all shared deps are listed explicitly.
lib_deps     =
    symlink://${PROJECT_DIR}/../shared/leds
    symlink://${PROJECT_DIR}/../shared/io
    gilmaimon/ArduinoWebsockets@^0.5.4
    tzapu/WiFiManager@^2.0.17
    bblanchon/ArduinoJson@^7.0.0
    makuna/NeoPixelBus@^2.7.0
    waspinator/AccelStepper@^1.64
    https://github.com/pschatzmann/ESP32-A2DP.git#v1.8.4
build_flags  =
    -I../shared
    -DHAS_BT_AUDIO
    -DCONFIG_BT_ENABLED
    -DCONFIG_CLASSIC_BT_ENABLED

[env:esp32-noaudio]
board        = esp32dev
upload_port  = COM8
monitor_port = COM8
upload_speed = 921600
; Generic ESP32 without Bluetooth audio (drop-in replacement for esp32-s3 where BT is absent)
; Strips BOARD_HAS_PSRAM since standard DevKit boards don't have on-board PSRAM
build_flags  =
    -I../shared
