# Build and release the ESP8266 sensor firmware.
# On every push to main or a release tag (v*.*.*), compiles the PlatformIO
# project and attaches firmware.bin to a GitHub Release so users can flash
# the device from their browser via /flash-sensor without any local toolchain.

name: Build Sensor Firmware

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    paths:
      - "clients/esp8266-sensor/**"
      - ".github/workflows/build-sensor-firmware.yml"

jobs:
  build:
    name: Compile firmware (PlatformIO)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          cd clients/esp8266-sensor
          pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: sensor-firmware
          path: clients/esp8266-sensor/.pio/build/d1_mini/firmware.bin
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: sensor-firmware
          path: dist/

      - name: Create or update GitHub Release
        run: |
          # Try to view the existing release; treat only "release not found" as a missing release.
          if gh release view "${{ github.ref_name }}" 2>&1 | grep -q "release not found"; then
            gh release create "${{ github.ref_name }}" dist/firmware.bin \
              --title "Sensor Firmware ${{ github.ref_name }}" \
              --notes $'Pre-compiled ESP8266 sensor firmware for the Roll-a-Ball Derby sensor node.\n\n**Flash without any toolchain**: open `http://<server-ip>:3000/flash-sensor` in Chrome or Edge, plug in the Wemos D1 Mini via USB, and click *Install*.'
          else
            gh release upload "${{ github.ref_name }}" dist/firmware.bin --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
