# Build the sensor firmware (ESP8266 + ESP32) and publish a GitHub Release.
# Triggered manually from the Actions tab — no automatic push/tag triggers.
# Choose the source branch and the release tag (default: "latest").
# Three board targets are built:
#   firmware-wemos-d1-mini.zip  — Wemos D1 Mini
#   firmware-nodemcu-v3.zip     — NodeMCU v3 (nodemcuv2 board ID in PlatformIO)
#   firmware-esp32-devkit.zip   — ESP32 DevKit (esp32dev board ID in PlatformIO)
# A raw firmware.bin (Wemos D1 Mini) is also attached so the ESP Web Tools
# manifest URL continues to work without change.

name: Build Sensor Firmware

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "main"
        type: string
      tag:
        description: "Release tag (e.g. v1.0.0 or 'latest')"
        required: true
        default: "latest"
        type: string

jobs:
  build:
    name: Compile firmware (PlatformIO)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        # esptool.py requires intelhex when generating ESP32 bootloader/bin assets.
        run: pip install platformio intelhex

      - name: Build firmware (all board targets)
        run: |
          cd clients/esp8266-sensor
          pio run

      - name: Package firmware artifacts
        run: |
          mkdir -p dist

          # --- Wemos D1 Mini ---
          # Keep a raw firmware.bin at the repo root so the ESP Web Tools manifest URL works.
          cp clients/esp8266-sensor/.pio/build/d1_mini/firmware.bin dist/firmware.bin
          (cd clients/esp8266-sensor/.pio/build/d1_mini && \
            zip -j "$GITHUB_WORKSPACE/dist/firmware-wemos-d1-mini.zip" firmware.bin)

          # --- NodeMCU v3 ---
          (cd clients/esp8266-sensor/.pio/build/nodemcuv2 && \
            zip -j "$GITHUB_WORKSPACE/dist/firmware-nodemcu-v3.zip" firmware.bin)

          # --- ESP32 DevKit ---
          cp clients/esp8266-sensor/.pio/build/esp32dev/firmware.bin dist/firmware-esp32dev.bin
          (cd clients/esp8266-sensor/.pio/build/esp32dev && \
            zip -j "$GITHUB_WORKSPACE/dist/firmware-esp32-devkit.zip" firmware.bin)

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sensor-firmware
          path: dist/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: sensor-firmware
          path: dist/

      - name: Create or update GitHub Release
        run: |
          TAG="${{ inputs.tag }}"
          # Use exit code to detect whether the release already exists.
          # If gh release view exits 0 the release exists → upload/clobber.
          # Any non-zero exit means it doesn't exist yet → create it.
          ASSETS="dist/firmware.bin dist/firmware-wemos-d1-mini.zip dist/firmware-nodemcu-v3.zip dist/firmware-esp32dev.bin dist/firmware-esp32-devkit.zip"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" $ASSETS --clobber
          else
            gh release create "$TAG" $ASSETS \
              --title "Sensor Firmware $TAG" \
              --notes $'Pre-compiled sensor firmware for the Roll-a-Ball Derby sensor node.\n\n| File | Board |\n|------|-------|\n| `firmware-wemos-d1-mini.zip` | Wemos D1 Mini |\n| `firmware-nodemcu-v3.zip` | NodeMCU v3 |\n| `firmware-esp32-devkit.zip` | ESP32 DevKit |\n| `firmware.bin` | Wemos D1 Mini (raw binary for ESP Web Tools flasher) |\n| `firmware-esp32dev.bin` | ESP32 DevKit (raw binary for ESP Web Tools flasher) |\n\n**Flash without any toolchain**: open `http://localhost:3000/flash-sensor` in Chrome or Edge (on the same machine as the server), plug in the device via USB, and click *Install*.'
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
