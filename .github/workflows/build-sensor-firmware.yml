# Build the ESP8266 sensor firmware and publish a GitHub Release.
# Triggered manually from the Actions tab — no automatic push/tag triggers.
# Choose the source branch and the release tag (default: "latest").

name: Build Sensor Firmware

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "main"
        type: string
      tag:
        description: "Release tag (e.g. v1.0.0 or 'latest')"
        required: true
        default: "latest"
        type: string

jobs:
  build:
    name: Compile firmware (PlatformIO)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          cd clients/esp8266-sensor
          pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: sensor-firmware
          path: clients/esp8266-sensor/.pio/build/d1_mini/firmware.bin
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: sensor-firmware
          path: dist/

      - name: Create or update GitHub Release
        run: |
          TAG="${{ inputs.tag }}"
          # Try to view the existing release; treat only "release not found" as a missing release.
          if gh release view "$TAG" 2>&1 | grep -q "release not found"; then
            gh release create "$TAG" dist/firmware.bin \
              --title "Sensor Firmware $TAG" \
              --notes $'Pre-compiled ESP8266 sensor firmware for the Roll-a-Ball Derby sensor node.\n\n**Flash without any toolchain**: open `http://<server-ip>:3000/flash-sensor` in Chrome or Edge, plug in the Wemos D1 Mini via USB, and click *Install*.'
          else
            gh release upload "$TAG" dist/firmware.bin --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
